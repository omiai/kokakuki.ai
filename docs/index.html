<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kokakuki.ai</title>
    <style>
      :root {
        color-scheme: light dark;
        --background: #f8fafc;
        --foreground: #0f172a;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #020617;
          --foreground: #f8fafc;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--background);
        color: var(--foreground);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0;
        padding: 0 1rem;
        font-size: clamp(3rem, 16vw, 12rem);
        font-weight: 800;
        letter-spacing: -0.08em;
        line-height: 0.9;
        text-align: center;
      }
    </style>
  </head>
